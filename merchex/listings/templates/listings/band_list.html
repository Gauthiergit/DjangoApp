{% extends "listings/base.html" %}

{% block content %}

<h1>Groupes</h1>

<a href="{% url 'band-create' %}">Créer un nouveau groupe</a>

<p>Voici notre liste de groupes :</p>

<ul>
    {% for band in bands %}
        <li>
            <a href="{% url 'band-detail' band.id %}">{{ band.name }}</a>
            - <a href="{% url 'band-change' band.id %}">[modifier]</a>
            - <a href="{% url 'band-delete' band.id %}">[supprimer]</a>
        </li> <!--2 arguments à la balise url-->
    {% endfor %}
</ul>

{% endblock %}
