{% extends "listings/base.html" %}

{% block content %}

<h1>Liste des annonces</h1>

<a href="{% url 'listing-create' %}">Créer une nouvelle annonce</a>

<p>Nos dernières nouveautés:</p>
<ul>
    {% for listing in listings %}
    <li><a href="{% url 'listing-detail' listing.id %}">{{ listing.title }}</a></li> <!--2 arguments à la balise url-->
    {% endfor %}
</ul>

{% endblock %}
